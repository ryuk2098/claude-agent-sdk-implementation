<!DOCTYPE html>
<html>
<head>
<style>
html { background: #277884; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #277884; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.accent-bar {
  width: 80pt; height: 5pt; background: #FE4447; margin-bottom: 24pt;
  border-radius: 3pt;
}
.title {
  color: #FFFFFF; font-size: 44pt; font-weight: bold; text-align: center;
  margin: 0 60pt; line-height: 1.2;
}
.subtitle {
  color: #B2DFDB; font-size: 20pt; text-align: center;
  margin: 20pt 80pt 0 80pt;
}
.bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 8pt; background: #FE4447;
}
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div>
    <h1 class="title">Welcome to Our Presentation</h1>
    <p class="subtitle">A Simple Two-Slide Demo</p>
  </div>
  <div class="bottom-bar"></div>
</body>
</html>

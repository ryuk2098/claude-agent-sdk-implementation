<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doc Agent</title>
  <style>
    /* ── Reset & Base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1a1a;
      --bg-raised: #242424;
      --bg-input:  #2a2a2a;
      --border:    #333;
      --border-focus: #555;
      --text:      #e8e8e8;
      --text-dim:  #888;
      --text-muted:#666;
      --accent:    #c4956a;
      --accent-dim:#a07850;
      --green:     #5cb870;
      --green-dim: #2d4a33;
      --red:       #e05555;
      --red-dim:   #4a2020;
      --blue:      #5b9bd5;
      --blue-dim:  #1e3a5f;
      --yellow:    #d4a843;
      --yellow-dim:#3d3520;
      --purple:    #9b7ecb;
      --radius:    10px;
      --radius-sm: 6px;
      --font:      'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --mono:      'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Layout ─────────────────────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .session-badge {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--bg-input);
      padding: 3px 10px;
      border-radius: 12px;
      font-family: var(--mono);
      border: 1px solid var(--border);
    }

    /* ── Message Feed ──────────────────────────────────────────── */
    .feed {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
      scroll-behavior: smooth;
    }
    .feed::-webkit-scrollbar { width: 6px; }
    .feed::-webkit-scrollbar-track { background: transparent; }
    .feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: var(--text-muted);
    }
    .empty-state-icon {
      width: 56px;
      height: 56px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .empty-state p { font-size: 14px; max-width: 320px; text-align: center; line-height: 1.6; }

    /* ── Event Items ───────────────────────────────────────────── */
    .event {
      margin-bottom: 2px;
      animation: slideIn 0.2s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* -- User message -- */
    .event-user {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .event-user .event-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .event-user .event-content {
      color: var(--text);
      font-size: 14px;
    }

    /* -- Tool events -- */
    .event-tool {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: var(--mono);
      color: var(--text-dim);
    }
    .event-tool.active {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .event-tool .tool-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .event-tool .tool-name {
      color: var(--blue);
      font-weight: 500;
    }
    .event-tool .tool-summary {
      color: var(--text-dim);
      margin-left: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 500px;
    }

    /* Spinning indicator for active tool */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* -- Text output (streaming) -- */
    .event-text {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin: 12px 0;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .event-text .cursor {
      display: inline-block;
      width: 2px;
      height: 16px;
      background: var(--accent);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* -- Status / Turn -- */
    .event-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .event-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    /* -- Error -- */
    .event-error {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--red-dim);
      border: 1px solid #6b2e2e;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin: 8px 0;
      font-size: 13px;
      color: #f0a0a0;
    }
    .event-error .error-icon { flex-shrink: 0; font-size: 14px; }

    /* -- Result -- */
    .event-result {
      background: var(--green-dim);
      border: 1px solid #3a6b3a;
      border-radius: var(--radius);
      padding: 14px 16px;
      margin: 12px 0;
    }
    .event-result .result-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--green);
      margin-bottom: 10px;
    }
    .event-result .result-body {
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .event-result .result-meta {
      margin-top: 10px;
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--mono);
    }

    /* -- Files -- */
    .event-files {
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .event-files .file-list {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .event-files .file-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ── Turn progress bar ─────────────────────────────────────── */
    .turn-bar {
      display: none;
      padding: 0 24px 8px;
      flex-shrink: 0;
    }
    .turn-bar.visible { display: block; }
    .turn-bar-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--mono);
    }
    .turn-bar-track {
      flex: 1;
      height: 3px;
      background: var(--bg-input);
      border-radius: 2px;
      overflow: hidden;
    }
    .turn-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* ── Input ──────────────────────────────────────────────────── */
    .input-area {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-field {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    .input-field::placeholder { color: var(--text-muted); }
    .input-field:focus { border-color: var(--border-focus); }

    .send-btn {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: opacity 0.15s, background 0.15s;
    }
    .send-btn:hover { background: var(--accent-dim); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Upload area */
    .upload-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .upload-btn:hover { border-color: var(--border-focus); color: var(--text); }
    .upload-status { font-family: var(--mono); }

    /* Session selector */
    .session-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .session-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      outline: none;
    }
    .session-input::placeholder { color: var(--text-muted); }
    .session-input:focus { border-color: var(--border-focus); }
    .new-session-btn {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .new-session-btn:hover { border-color: var(--border-focus); color: var(--text); }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="header-logo">D</div>
        <h1>Doc Agent</h1>
      </div>
      <span class="session-badge" id="sessionBadge">No session</span>
    </div>

    <!-- Message Feed -->
    <div class="feed" id="feed">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">D</div>
        <p>Attach documents and give an instruction. You'll see every step the agent takes in real time.</p>
      </div>
    </div>

    <!-- Turn Progress -->
    <div class="turn-bar" id="turnBar">
      <div class="turn-bar-inner">
        <span id="turnLabel">Turn 0/25</span>
        <div class="turn-bar-track">
          <div class="turn-bar-fill" id="turnFill"></div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="upload-row">
        <label class="upload-btn" for="fileInput">
          <span>+</span> Attach files
        </label>
        <input type="file" id="fileInput" accept=".pptx,.docx,.xlsx" multiple hidden />
        <span class="upload-status" id="uploadStatus"></span>
      </div>
      <div class="session-row">
        <input class="session-input" id="sessionInput" placeholder="Session ID (leave empty for new)" />
        <button class="new-session-btn" id="newSessionBtn">New session</button>
      </div>
      <div class="input-wrapper">
        <textarea class="input-field" id="promptInput" placeholder="Tell the agent what to do..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" title="Send">&#8593;</button>
      </div>
    </div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────
    let currentSessionId = null;
    let isRunning = false;
    let activeToolEl = null;   // The DOM element for the currently running tool
    let textBlockEl = null;    // The DOM element for the streaming text output
    let selectedFiles = [];    // Files waiting to be sent

    // ── DOM refs ──────────────────────────────────────────────
    const feed         = document.getElementById('feed');
    const emptyState   = document.getElementById('emptyState');
    const sessionBadge = document.getElementById('sessionBadge');
    const sessionInput = document.getElementById('sessionInput');
    const promptInput  = document.getElementById('promptInput');
    const sendBtn      = document.getElementById('sendBtn');
    const newSessionBtn = document.getElementById('newSessionBtn');
    const fileInput    = document.getElementById('fileInput');
    const uploadStatus = document.getElementById('uploadStatus');
    const turnBar      = document.getElementById('turnBar');
    const turnLabel    = document.getElementById('turnLabel');
    const turnFill     = document.getElementById('turnFill');

    // ── Helpers ───────────────────────────────────────────────
    function scrollToBottom() {
      feed.scrollTop = feed.scrollHeight;
    }

    function setRunning(running) {
      isRunning = running;
      sendBtn.disabled = running;
      promptInput.disabled = running;
    }

    function updateSessionBadge(id) {
      if (id) {
        sessionBadge.textContent = id.slice(0, 8) + '...';
        sessionBadge.title = id;
        sessionInput.value = id;
      } else {
        sessionBadge.textContent = 'No session';
      }
    }

    function hideEmptyState() {
      if (emptyState) emptyState.style.display = 'none';
    }

    function toolIcon(name) {
      const icons = {
        Bash: '$', Read: 'R', Write: 'W', Edit: 'E',
        Glob: 'G', Grep: 'S', Skill: 'Sk', TodoWrite: 'T',
      };
      return icons[name] || name.charAt(0);
    }

    // ── Renderers ─────────────────────────────────────────────
    function addUserMessage(text) {
      hideEmptyState();
      const el = document.createElement('div');
      el.className = 'event event-user';
      el.innerHTML = `
        <div class="event-label">You</div>
        <div class="event-content">${escapeHtml(text)}</div>
      `;
      feed.appendChild(el);
      scrollToBottom();
    }

    function addToolStart(toolName) {
      const el = document.createElement('div');
      el.className = 'event event-tool active';
      el.innerHTML = `
        <div class="tool-icon"><span class="spinner"></span></div>
        <span class="tool-name">${escapeHtml(toolName)}</span>
        <span class="tool-summary" id="toolSummary"></span>
      `;
      feed.appendChild(el);
      activeToolEl = el;
      scrollToBottom();
    }

    function completeToolEvent(toolName, summary) {
      if (activeToolEl) {
        activeToolEl.classList.remove('active');
        const iconEl = activeToolEl.querySelector('.tool-icon');
        iconEl.innerHTML = `<span style="color:var(--green)">&#10003;</span>`;
        const summaryEl = activeToolEl.querySelector('.tool-summary');
        if (summary) summaryEl.textContent = summary;
        activeToolEl = null;
      }
      scrollToBottom();
    }

    function ensureTextBlock() {
      if (!textBlockEl) {
        textBlockEl = document.createElement('div');
        textBlockEl.className = 'event event-text';
        textBlockEl.innerHTML = '<span class="text-content"></span><span class="cursor"></span>';
        feed.appendChild(textBlockEl);
      }
      return textBlockEl.querySelector('.text-content');
    }

    function appendTextDelta(text) {
      const span = ensureTextBlock();
      span.textContent += text;
      scrollToBottom();
    }

    function finalizeTextBlock() {
      if (textBlockEl) {
        const cursor = textBlockEl.querySelector('.cursor');
        if (cursor) cursor.remove();
        textBlockEl = null;
      }
    }

    function addStatus(message) {
      const el = document.createElement('div');
      el.className = 'event event-status';
      el.innerHTML = `<span class="dot"></span> ${escapeHtml(message)}`;
      feed.appendChild(el);
      scrollToBottom();
    }

    function addError(message) {
      finalizeTextBlock();
      const el = document.createElement('div');
      el.className = 'event event-error';
      el.innerHTML = `
        <span class="error-icon">&#9888;</span>
        <span>${escapeHtml(message)}</span>
      `;
      feed.appendChild(el);
      scrollToBottom();
    }

    function addResult(data) {
      finalizeTextBlock();
      const el = document.createElement('div');
      el.className = 'event event-result';

      let metaHtml = '';
      if (data.turns_used || data.cost_usd) {
        metaHtml = '<div class="result-meta">';
        if (data.turns_used) metaHtml += `<span>${data.turns_used} turns</span>`;
        if (data.cost_usd) metaHtml += `<span>$${data.cost_usd.toFixed(4)}</span>`;
        metaHtml += '</div>';
      }

      el.innerHTML = `
        <div class="result-header"><span>&#10003;</span> Complete</div>
        <div class="result-body">${escapeHtml(data.result || '')}</div>
        ${metaHtml}
      `;
      feed.appendChild(el);
      scrollToBottom();
    }

    function addFiles(files) {
      if (!files || files.length === 0) return;
      const el = document.createElement('div');
      el.className = 'event event-files';
      const items = files.map(f => {
        const name = f.split('/').pop();
        return `<div class="file-item"><span>&#128196;</span> ${escapeHtml(name)}</div>`;
      }).join('');
      el.innerHTML = `
        <strong>Files created:</strong>
        <div class="file-list">${items}</div>
      `;
      feed.appendChild(el);
      scrollToBottom();
    }

    function updateTurnBar(turn, maxTurns) {
      turnBar.classList.add('visible');
      turnLabel.textContent = `Turn ${turn}/${maxTurns}`;
      turnFill.style.width = `${(turn / maxTurns) * 100}%`;
    }

    function hideTurnBar() {
      turnBar.classList.remove('visible');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ── Stream Handler ────────────────────────────────────────
    async function sendInstruction(instruction, sessionId, files = []) {
      hideEmptyState();
      addUserMessage(instruction);
      setRunning(true);

      const formData = new FormData();
      formData.append('instruction', instruction);
      if (sessionId) formData.append('session_id', sessionId);
      for (const file of files) {
        formData.append('files', file);
      }

      try {
        const response = await fetch('/agent/stream', {
          method: 'POST',
          // No Content-Type header, let browser set it with boundary
          body: formData,
        });

        if (!response.ok) {
          const err = await response.text();
          addError(`HTTP ${response.status}: ${err}`);
          setRunning(false);
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n\n');
          buffer = lines.pop(); // Keep incomplete chunk in buffer

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const event = JSON.parse(line.slice(6));
              handleEvent(event);
            } catch (e) {
              console.warn('Failed to parse SSE:', line, e);
            }
          }
        }

        // Process any remaining buffer
        if (buffer.startsWith('data: ')) {
          try {
            handleEvent(JSON.parse(buffer.slice(6)));
          } catch (e) { /* ignore */ }
        }

      } catch (err) {
        addError(`Network error: ${err.message}`);
      } finally {
        finalizeTextBlock();
        if (activeToolEl) {
          completeToolEvent('', 'interrupted');
        }
        hideTurnBar();
        setRunning(false);
      }
    }

    function handleEvent(event) {
      switch (event.type) {
        case 'session_start':
          currentSessionId = event.session_id;
          updateSessionBadge(event.session_id);
          break;

        case 'status':
          if (event.turn !== undefined) {
            updateTurnBar(event.turn, event.max_turns);
          }
          addStatus(event.message);
          break;

        case 'tool_start':
          finalizeTextBlock();
          addToolStart(event.tool);
          break;

        case 'tool_end':
          completeToolEvent(event.tool, event.summary);
          break;

        case 'text_delta':
          appendTextDelta(event.text);
          break;

        case 'error':
          addError(event.message);
          break;

        case 'result':
          addResult(event);
          break;

        case 'files':
          addFiles(event.files_modified);
          break;

        case 'done':
          addStatus('Done');
          hideTurnBar();
          break;
      }
    }

    // ── File Upload ───────────────────────────────────────────
    fileInput.addEventListener('change', () => {
      const files = fileInput.files;
      if (!files.length) return;

      selectedFiles = Array.from(files);
      uploadStatus.textContent = `${selectedFiles.length} file(s) attached`;
    });

    // ── New Session ───────────────────────────────────────────
    newSessionBtn.addEventListener('click', async () => {
      try {
        const res = await fetch('/sessions', { method: 'POST' });
        const data = await res.json();
        currentSessionId = data.session_id;
        sessionInput.value = data.session_id;
        updateSessionBadge(data.session_id);

        // Clear feed
        feed.innerHTML = '';
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.id = 'emptyState';
        empty.innerHTML = `
          <div class="empty-state-icon">D</div>
          <p>New session created. Give the agent an instruction.</p>
        `;
        feed.appendChild(empty);
      } catch (err) {
        addError(`Failed to create session: ${err.message}`);
      }
    });

    // ── Send ──────────────────────────────────────────────────
    function handleSend() {
      const text = promptInput.value.trim();
      if (!text || isRunning) return;

      const sid = sessionInput.value.trim() || currentSessionId || null;
      promptInput.value = '';
      promptInput.style.height = 'auto';

      sendInstruction(text, sid, selectedFiles);

      // Clear attached files
      selectedFiles = [];
      uploadStatus.textContent = '';
      fileInput.value = ''; // Reset input
    }

    sendBtn.addEventListener('click', handleSend);

    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    // Auto-resize textarea
    promptInput.addEventListener('input', () => {
      promptInput.style.height = 'auto';
      promptInput.style.height = Math.min(promptInput.scrollHeight, 160) + 'px';
    });
  </script>
</body>
</html>

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip for faster asset delivery
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Proxy all API paths to the backend service
    location ~ ^/(agent|auth|sessions|messages|feedback|health) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        # Required for SSE / streaming responses
        proxy_set_header   Connection '';
        chunked_transfer_encoding on;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all other routes served by index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

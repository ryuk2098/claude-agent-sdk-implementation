# Root docker-compose.yml — starts both Backend and Frontend together
# Usage: docker compose up --build
#
# Frontend → http://localhost:3000  (Nginx, proxies API paths to backend)
# Backend  → http://localhost:8000  (FastAPI, also directly accessible)

services:

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: doc-agent-backend
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    environment:
      - WORKSPACE_DIR=/workspace
    volumes:
      - workspace_data:/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: doc-agent-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  workspace_data:
